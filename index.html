<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body { font-family: sans-serif; }

button {
  margin:5px;
  padding:8px;
  border:1px solid #ccc;
  background:white;
}

.selected {
  background:#333;
  color:white;
}

h3 {
  border-bottom:1px solid #ddd;
  margin-top:20px;
}

input {
  margin-bottom:10px;
  padding:8px;
  width:200px;
}

/* ローディング */
#loading {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #333;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br>
<input id="email" placeholder="メール（任意）"><br>

<div id="dates"></div>

<br>
<button onclick="submitData()">送信</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzdMIWKc1l0qEx9q_fgC2yyV2_9oXagZfGZbjZ_W2bu1jP2ZE5rekPxgbPTzTZyRIj6/exec";

let dates = [];
let answers = [];

// =======================
// GET
// =======================
fetch(API_URL)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("dates");
  let currentMonth = "";

  if (!data.dates) {
    document.getElementById("loading").innerHTML = "データ取得エラー";
    return;
  }

  data.dates.forEach(key => {

    const date = new Date(key);
    const month = date.getMonth() + 1;
    const day = date.getDate();
    const display = `${month}/${day}`;

    if (currentMonth !== month + "月") {
      currentMonth = month + "月";

      const h = document.createElement("h3");
      h.textContent = currentMonth;
      container.appendChild(h);
    }

    const i = dates.length;

    dates.push(key);
    answers.push("");

    const div = document.createElement("div");

    div.innerHTML = `
      <p>${display}</p>
      <button onclick="setAnswer(${i},'○',this)">○</button>
      <button onclick="setAnswer(${i},'△',this)">△</button>
      <button onclick="setAnswer(${i},'×',this)">×</button>
    `;

    container.appendChild(div);
  });

  document.getElementById("loading").style.display = "none";

})
.catch(err => {
  console.log(err);
  document.getElementById("loading").innerHTML = "読み込みエラー";
});


// =======================
function setAnswer(i, val, btn) {

  answers[i] = val;

  const buttons = btn.parentNode.querySelectorAll("button");
  buttons.forEach(b => b.classList.remove("selected"));

  btn.classList.add("selected");
}


// =======================
// POST（CORS回避版）
// =======================
function submitData() {

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name) {
    alert("名前を入力してください");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name,
      email,
      dates,
      answers
    })
  })
  .then(async r => {
    const text = await r.text();
    console.log(text);

    try {
      return JSON.parse(text);
    } catch {
      throw new Error("JSONじゃないレスポンス");
    }
  })
  .then(res => {

    if (res.ok) {
      alert("送信完了");
    } else {
      alert("エラー：" + res.error);
    }

  })
  .catch(err => {
    alert("通信エラー: " + err.message);
  });
}

</script>

</body>
</html>
