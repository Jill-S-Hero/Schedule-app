<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body { font-family: sans-serif; }
button { margin:5px; padding:8px; }
.selected { background:#333; color:white; }
h3 { border-bottom:1px solid #ddd; margin-top:20px; }
input { margin-bottom:10px; padding:5px; }
</style>

</head>

<body>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br>
<input id="email" placeholder="メール（任意）"><br><br>

<div id="dates">読み込み中...</div>

<br>
<button onclick="submitData()">送信</button>

<script>

const API_URL = "あなたのGAS URL";

let dates = [];
let answers = [];

// =======================
// GET
// =======================
fetch(API_URL)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("dates");
  container.innerHTML = "";

  let currentMonth = "";

  Object.keys(data).forEach(key => {

    if (["名前","メール","更新日時"].includes(key)) return;

    // 6/3形式だけ通す
    if (!/^\d{1,2}\/\d{1,2}$/.test(key)) return;

    const [m, d] = key.split("/");

    if (m + "月" !== currentMonth) {
      currentMonth = m + "月";

      const h = document.createElement("h3");
      h.textContent = currentMonth;
      container.appendChild(h);
    }

    const i = dates.length;
    dates.push(key);
    answers.push("");

    const div = document.createElement("div");

    div.innerHTML = `
      <p>${key}</p>
      <button onclick="setAnswer(${i},'○',this)">○</button>
      <button onclick="setAnswer(${i},'△',this)">△</button>
      <button onclick="setAnswer(${i},'×',this)">×</button>
    `;

    container.appendChild(div);
  });

})
.catch(err => {
  console.log(err);
  document.getElementById("dates").innerHTML = "読み込みエラー";
});


// =======================
// 回答
// =======================
function setAnswer(i, val, btn) {

  answers[i] = val;

  const buttons = btn.parentNode.querySelectorAll("button");
  buttons.forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}


// =======================
// 送信
// =======================
function submitData() {

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name) {
    alert("名前を入力してください");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      email,
      dates,
      answers
    })
  })
  .then(r => r.json())
  .then(res => {

    if (res.ok) {
      alert("送信完了");
    } else {
      alert("エラー：" + (res.error || "unknown"));
    }

  })
  .catch(err => {
    alert("通信エラー");
    console.log(err);
  });

}

</script>

</body>
</html>
