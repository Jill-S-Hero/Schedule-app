<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
button { margin:5px; padding:8px; }
.selected { background:#333; color:#fff; }

#loading {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #333;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

h3 {
  margin-top: 20px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 5px;
}
</style>

</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br><br>
<input id="email" placeholder="メール（任意）"><br><br>

<div id="dates"></div>

<br>
<button onclick="submitData()">送信</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwrfToJ4wPDQ6jE4PZ-XoviNtmleLgm8sfvD3F0y1koyj7mev7gQfd30lCQPOMmeDUT5A/exec";

let dates = [];
let answers = [];

// =======================
// データ取得
// =======================
fetch(API_URL)
.then(res => res.json())
.then(data => {

  document.getElementById("loading").style.display = "none";

  const container = document.getElementById("dates");

  let currentMonth = "";

  Object.keys(data).forEach(key => {

    if (key === "名前" || key === "メール" || key === "更新日時") return;

    // key = "6/3" みたいな形前提
    const month = key.split("/")[0] + "月";

    if (month !== currentMonth) {
      currentMonth = month;
      const h = document.createElement("h3");
      h.textContent = currentMonth;
      container.appendChild(h);
    }

    const i = dates.length;

    dates.push(key);
    answers.push("");

    const div = document.createElement("div");

    div.innerHTML = `
      <p>${key}</p>
      <button onclick="setAnswer(${i},'○',this)">○</button>
      <button onclick="setAnswer(${i},'△',this)">△</button>
      <button onclick="setAnswer(${i},'×',this)">×</button>
      <span id="ans${i}"></span>
    `;

    container.appendChild(div);
  });

})
.catch(err => {
  console.log(err);
  alert("読み込みエラー");
});


// =======================
// 回答処理
// =======================
function setAnswer(i, val, btn) {

  answers[i] = val;
  document.getElementById("ans" + i).textContent = val;

  const buttons = btn.parentNode.querySelectorAll("button");
  buttons.forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}


// =======================
// 送信
// =======================
function submitData() {

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name) {
    alert("名前を入力してください");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name,
      email,
      dates,
      answers
    })
  })
  .then(res => res.text())
  .then(text => {

    console.log(text);

    try {
      const json = JSON.parse(text);

      if (json.ok) {
        alert("送信完了（メール：" + json.mailStatus + "）");
      } else {
        alert("エラー：" + json.error);
      }

    } catch (e) {
      alert("レスポンス解析エラー");
    }

  })
  .catch(err => {
    console.log(err);
    alert("通信エラー：" + err);
  });
}

</script>

</body>
</html>
