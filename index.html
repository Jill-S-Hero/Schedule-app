<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>日程調整</title>
</head>

<body>

<h2>ご都合を教えてください🌿</h2>

<input id="name" placeholder="お名前"><br><br>

<div id="dates"></div>

<button onclick="submitData()">送信</button>
<button onclick="deleteData()">削除</button>

<script>
const dates = ["5/10","5/12","5/15"];
const answers = Array(dates.length).fill("");

const container = document.getElementById("dates");

// 日付UI生成
dates.forEach((d,i)=>{
  const div = document.createElement("div");
  div.innerHTML = `
    <p>${d}</p>
    <button onclick="setAnswer(${i},'◎')">◎</button>
    <button onclick="setAnswer(${i},'○')">○</button>
    <button onclick="setAnswer(${i},'△')">△</button>
    <button onclick="setAnswer(${i},'×')">×</button>
    <span id="ans${i}"></span>
  `;
  container.appendChild(div);
});

// 回答セット
function setAnswer(i,val){
  answers[i] = val;
  document.getElementById("ans"+i).textContent = val;
}

// 送信
function submitData(){
  fetch("https://script.google.com/macros/s/AKfycbxPWXB5_XWQeCqqfeTCFNgT7L7qajEq8UdQwzqhmwL3wrftIXbkrgIwcHhVIyH85CYX4A/exec",{
    method:"POST",
    body:JSON.stringify({
      name: document.getElementById("name").value,
      answers: answers
    })
  }).then(()=>alert("送信完了🌿"));
}

// 削除
function deleteData(){
  fetch("https://script.google.com/macros/s/AKfycbxPWXB5_XWQeCqqfeTCFNgT7L7qajEq8UdQwzqhmwL3wrftIXbkrgIwcHhVIyH85CYX4A/exec",{
    method:"POST",
    body:JSON.stringify({
      mode:"delete",
      name: document.getElementById("name").value
    })
  })
  .then(res => res.json())
  .then(data => {

    if(data.status === "deleted"){
      alert("削除しました");

      // 名前リセット
      document.getElementById("name").value = "";

      // ○×リセット
      for(let i = 0; i < answers.length; i++){
        answers[i] = "";
        document.getElementById("ans"+i).textContent = "";
      }

    } else {
      alert("該当データがありません");
    }
  })
  .catch(err => {
    console.log(err);
  });
}

</script>

</body>
</html>
