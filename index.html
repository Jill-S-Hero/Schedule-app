<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
button { margin:5px; padding:8px; }
.selected { background:#333; color:#fff; }

#loading {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #333;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

h3 {
  margin-top: 20px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
</div>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br><br>
<input id="email" placeholder="メール（任意）"><br><br>

<div id="dates"></div>

<button onclick="submitData()">送信</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwrfToJ4wPDQ6jE4PZ-XoviNtmleLgm8sfvD3F0y1koyj7mev7gQfd30lCQPOMmeDUT5A/exec";

let dates = [];
let answers = [];

function normalize(d) {

  const date = new Date(d);

  if (!isNaN(date.getTime())) {
    return {
      month: (date.getMonth() + 1) + "月",
      text: (date.getMonth() + 1) + "/" + date.getDate()
    };
  }

  const parts = String(d).split("/");

  if (parts.length === 2) {
    return {
      month: parts[0] + "月",
      text: parts[0] + "/" + parts[1]
    };
  }

  return {
    month: "その他",
    text: String(d)
  };
}

// =======================
fetch(API_URL)
.then(res => res.json())
.then(data => {

  document.getElementById("loading").style.display = "none";

  const container = document.getElementById("dates");

  let currentMonth = "";

  Object.keys(data).forEach(key => {

    if (["名前","メール","更新日時"].includes(key)) return;

    const obj = normalize(key);

    if (obj.month !== currentMonth) {
      currentMonth = obj.month;

      const h = document.createElement("h3");
      h.textContent = currentMonth;
      container.appendChild(h);
    }

    const i = dates.length;

    dates.push(obj.text);
    answers.push("");

    const div = document.createElement("div");

    div.innerHTML = `
      <p>${obj.text}</p>
      <button onclick="setAnswer(${i},'○',this)">○</button>
      <button onclick="setAnswer(${i},'△',this)">△</button>
      <button onclick="setAnswer(${i},'×',this)">×</button>
      <span id="ans${i}"></span>
    `;

    container.appendChild(div);
  });

});

// =======================
function setAnswer(i,val,btn){
  answers[i] = val;
  document.getElementById("ans"+i).textContent = val;

  btn.parentNode.querySelectorAll("button")
    .forEach(b => b.classList.remove("selected"));

  btn.classList.add("selected");
}

// =======================
function submitData(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name,
      email,
      dates,
      answers
    })
  })
  .then(() => alert("送信完了"))
  .catch(() => alert("送信エラー"));
}

</script>

</body>
</html>
