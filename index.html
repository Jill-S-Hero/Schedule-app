<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwrfToJ4wPDQ6jE4PZ-XoviNtmleLgm8sfvD3F0y1koyj7mev7gQfd30lCQPOMmeDUT5A/exec";

function submitData(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name,
      email,
      dates,
      answers
    })
  })
  .then(async res => {

    const text = await res.text();
    console.log("RESPONSE:", text);

    try {
      const json = JSON.parse(text);

      if (!json.ok) {
        alert("エラー: " + json.error);
      } else {
        alert("送信完了（メール:" + json.mailStatus + "）");
      }

    } catch (e) {
      alert("レスポンス解析エラー");
    }

  })
  .catch(err => {
    console.log(err);
    alert("送信エラー: " + err);
  });
}

</script>
