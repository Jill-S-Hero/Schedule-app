<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
button { margin:5px; padding:8px; }
.selected { background:#333; color:#fff; }

#loading {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #333;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br><br>
<input id="email" placeholder="メール（任意）"><br><br>

<div id="dates"></div>

<button onclick="submitData()">送信</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby1PN2JxTdk_xAdM4oSnMc_7utd_RuoK4tlFMNnFch-tCtARQEjYRobg6-aR_OZyrnXHw/exec";

let dates = [];
let answers = [];

// =======================
// 日付取得
// =======================
fetch(API_URL)
.then(res => res.json())
.then(data => {

  document.getElementById("loading").style.display = "none";

  const container = document.getElementById("dates");

  Object.keys(data).forEach(month => {

    const h = document.createElement("h3");
    h.textContent = month;
    container.appendChild(h);

    data[month].forEach(d => {

      const i = dates.length;

      const parts = String(d).split("/");
      const formatted = Number(parts[0]) + "/" + Number(parts[1]);

      dates.push(formatted);
      answers.push("");

      const div = document.createElement("div");
      div.innerHTML = `
        <p>${formatted}</p>
        <button onclick="setAnswer(${i},'○',this)">○</button>
        <button onclick="setAnswer(${i},'△',this)">△</button>
        <button onclick="setAnswer(${i},'×',this)">×</button>
        <span id="ans${i}"></span>
      `;
      container.appendChild(div);
    });
  });
});


// =======================
// 回答
// =======================
function setAnswer(i,val,btn){
  answers[i] = val;
  document.getElementById("ans"+i).textContent = val;

  const buttons = btn.parentNode.querySelectorAll("button");
  buttons.forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

// =======================
// 送信
// =======================
function submitData(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!name){
    alert("名前を入力してください");
    return;
  }

fetch(API_URL, {
  method: "POST",
  body: JSON.stringify({
    name,
    email,
    dates,
    answers
  })
})
.then(res => res.text())
.then(() => {
  alert("送信完了");
})
.catch(() => {
  alert("送信エラー");
});
}

</script>

</body>
</html>
