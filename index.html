<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
button { margin:5px; padding:8px; }
.selected { background:#333; color:#fff; }
h3 { border-bottom:1px solid #ddd; margin-top:20px; }
</style>

</head>

<body>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br><br>
<input id="email" placeholder="メール"><br><br>

<div id="dates"></div>

<br>
<button onclick="submitData()">送信</button>

<script>

const API_URL = "ここに新GAS URL";

let dates = [];
let answers = [];

// =======================
// GET
// =======================
fetch(API_URL)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("dates");

  let currentMonth = "";

  Object.keys(data).forEach(key => {

    if (["名前","メール","更新日時"].includes(key)) return;

    const dateObj = new Date(key);

    if (!isNaN(dateObj)) {

      const month = (dateObj.getMonth() + 1) + "月";

      if (month !== currentMonth) {
        currentMonth = month;
        const h = document.createElement("h3");
        h.textContent = month;
        container.appendChild(h);
      }

      const i = dates.length;

      dates.push(key);
      answers.push("");

      const div = document.createElement("div");

      div.innerHTML = `
        <p>${key}</p>
        <button onclick="setAnswer(${i},'○',this)">○</button>
        <button onclick="setAnswer(${i},'△',this)">△</button>
        <button onclick="setAnswer(${i},'×',this)">×</button>
      `;

      container.appendChild(div);
    }

  });

})
.catch(() => {
  alert("読み込みエラー");
});


// =======================
// 回答
// =======================
function setAnswer(i, val, btn) {
  answers[i] = val;

  const buttons = btn.parentNode.querySelectorAll("button");
  buttons.forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}


// =======================
// 送信
// =======================
function submitData() {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name,
      email,
      dates,
      answers
    })
  })
  .then(r => r.json())
  .then(res => {
    alert(res.ok ? "送信完了" : "エラー");
  });

}

</script>

</body>
</html>
