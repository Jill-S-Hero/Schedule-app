<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body { font-family: sans-serif; }

button {
  margin:5px;
  padding:8px;
  border:1px solid #ccc;
  background:white;
}
.selected {
  background:#333;
  color:white;
}
h3 {
  border-bottom:1px solid #ddd;
  margin-top:20px;
}
input {
  margin-bottom:10px;
  padding:8px;
  width:200px;
}

/* ローディング */
#loading {
  position: fixed;
  inset: 0;
  background: white;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.spinner {
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #333;
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br>
<input id="email" placeholder="メール（任意）"><br>

<div id="dates"></div>

<br>
<button onclick="submitData()">送信</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzoRsQefR7uDn16YwJ6OqQnfuD4Flt8-mQ0nqT97aaTiM_h5ew532DGI01sxMxCdbE/exec";

let dates = [];
let answers = [];

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const box = document.getElementById("dates");
  let currentMonth = "";

  data.dates.forEach(d => {

    const display = String(d);
    const [m, day] = display.split("/").map(Number);

    if(currentMonth !== m){
      currentMonth = m;

      const h = document.createElement("h3");
      h.textContent = m + "月";
      box.appendChild(h);
    }

    const i = dates.length;

    dates.push(display);
    answers.push("");

    const div = document.createElement("div");

    div.innerHTML = `
      <p>${display}</p>
      <button onclick="setAns(${i},'○',this)">○</button>
      <button onclick="setAns(${i},'△',this)">△</button>
      <button onclick="setAns(${i},'×',this)">×</button>
    `;

    box.appendChild(div);
  });

  document.getElementById("loading").style.display = "none";
});

function setAns(i,val,btn){
  answers[i]=val;

  btn.parentNode.querySelectorAll("button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");
}

function submitData(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!name){
    alert("名前を入力してください");
    return;
  }

  // 未選択エラー
  const hasAnswer = answers.some(a => a !== "");
  if(!hasAnswer){
    alert("１つ以上選択してください");
    return;
  }

    // 送信中ローディング表示
  document.querySelector("#loading p").textContent = "送信中...";
  document.getElementById("loading").style.display = "flex";

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({name,email,dates,answers})
  })
  .then(r=>r.json())
  .then(res=>{
  document.getElementById("loading").style.display = "none";

  if(res.ok){

    const name = document.getElementById("name").value;

    document.body.innerHTML = `
      <div style="text-align:center; margin-top:50px;">
        <h2>入力ありがとうございました</h2>
        <p>出欠を受け付けました。</p>

        <button onclick="location.reload()" style="
          margin-top:20px;
          padding:10px 20px;
          font-size:16px;
        ">
          もう一度入力する
        </button>
      </div>
    `;

  }else{
    alert("エラー："+res.error);
  }
});
}

</script>

</body>
</html>
