<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
button { margin:5px; padding:8px; }
.selected { background:#333; color:#fff; }
</style>
</head>

<body>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br><br>
<input id="email" placeholder="メール（任意）"><br>
<p>入力結果を受け取りたい場合はメールアドレスを入力してください</p>

<div id="dates"></div>

<button onclick="submitData()">送信</button>

<script>
let dates = [];
let answers = [];

// ★ここだけ自分のURL
const API_URL = "https://script.google.com/macros/s/AKfycbw2RVyLbpXcv74tcMqlaJI3hSAuZaui77dKr_3FQwdL-xvUE7fVQGJpYs98UEk7XRpIlQ/exec";

// 日付取得
fetch(API_URL)
.then(res => res.text())
.then(text => {

  console.log("生データ:", text); // ←確認用

  const data = JSON.parse(text);

  const container = document.getElementById("dates");

  Object.keys(data).forEach(month => {
    const h = document.createElement("h3");
    h.textContent = month;
    container.appendChild(h);

    data[month].forEach(d => {

      const i = dates.length;

      const parts = String(d).split("/");
      const formatted = Number(parts[0]) + "/" + Number(parts[1]);

      dates.push(formatted);
      answers.push("");

      const div = document.createElement("div");
      div.innerHTML = `
        <p>${formatted}</p>
        <button onclick="setAnswer(${i},'○',this)">○</button>
        <button onclick="setAnswer(${i},'△',this)">△</button>
        <button onclick="setAnswer(${i},'×',this)">×</button>
        <span id="ans${i}"></span>
      `;
      container.appendChild(div);
    });
  });

})
.catch(err => {
  console.error("日付取得エラー:", err);
});

// 回答セット
function setAnswer(i,val,btn){
  answers[i] = val;
  document.getElementById("ans"+i).textContent = val;

  const buttons = btn.parentNode.querySelectorAll("button");
  buttons.forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

// 送信
function submitData(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!name){
    alert("名前を入力してください");
    return;
  }

  if(answers.every(a => !a)){
    alert("１つ以上選択してください");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name:name,
      email:email,
      dates:dates,
      answers:answers,
      monthText:"今月",
      url:location.href
    })
  })
  .then(res => res.text())
  .then(res => {
    console.log(res);
    alert("送信完了🌿");
  })
  .catch(err => {
    console.error(err);
    alert("送信エラー");
  });
}
</script>

</body>
</html>
