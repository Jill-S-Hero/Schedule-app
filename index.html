<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
button { margin:5px; padding:8px; }
.selected { background:#333; color:#fff; }
.unselected { background:#eee; color:#999; }
</style>
</head>

<body>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br><br>
<input id="email" placeholder="メール（任意）"><br>
<p>入力結果を受け取りたい場合はメールアドレスを入力してください</p>

<div id="dates"></div>

<button onclick="submitData()">送信</button>

<script>
let dates = [];
let answers = [];

fetch("https://script.google.com/macros/s/AKfycbyRmCFxXUu2GIJutJnKek3lNmDlNWUkDjRzEdEHVyBwL7vr0B1azhcoZoY_JOKvwGFzSg/exec")
.then(res=>res.json())
.then(data=>{
  const container = document.getElementById("dates");

  Object.keys(data).forEach(month=>{
    const h = document.createElement("h3");
    h.textContent = month;
    container.appendChild(h);

    data[month].forEach(d=>{
      const i = dates.length;
      dates.push(d);
      answers.push("");

      const div = document.createElement("div");
      div.innerHTML = `
        <p>${d}</p>
        <button onclick="setAnswer(${i},'○',this)">○</button>
        <button onclick="setAnswer(${i},'△',this)">△</button>
        <button onclick="setAnswer(${i},'×',this)">×</button>
        <span id="ans${i}"></span>
      `;
      container.appendChild(div);
    });
  });
});

function setAnswer(i,val,btn){
  answers[i]=val;
  document.getElementById("ans"+i).textContent=val;

  const buttons = btn.parentNode.querySelectorAll("button");
  buttons.forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

function submitData(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  if(!name){
    alert("名前を入力してください");
    return;
  }

  if(answers.every(a=>!a)){
    alert("１つ以上選択してください");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyRmCFxXUu2GIJutJnKek3lNmDlNWUkDjRzEdEHVyBwL7vr0B1azhcoZoY_JOKvwGFzSg/exec",{
    method:"POST",
    body:JSON.stringify({
      name:name,
      email:email,
      dates:dates,
      answers:answers,
      monthText:"今月",
      url:location.href
    })
  }).then(()=>alert("送信完了🌿"));
}
</script>

</body>
</html>
