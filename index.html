<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body { font-family: sans-serif; }

button {
  margin:5px;
  padding:8px;
  border:1px solid #ccc;
  background:white;
}
.selected {
  background:#333;
  color:white;
}
h3 {
  border-bottom:1px solid #ddd;
  margin-top:20px;
}
input {
  margin-bottom:10px;
  padding:8px;
  width:200px;
}
#loading {
  position: fixed;
  inset: 0;
  background: white;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>

</head>

<body>

<div id="loading">読み込み中...</div>

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前"><br>
<input id="email" placeholder="メール（任意）"><br>

<div id="dates"></div>

<button onclick="submitData()">送信</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwcq5i5SCyuzVQUiWKUuYTzIyi8J4_ntD6OO0V9Xz_SnivlfevF5E1Il3t1iCkYZhI/exec";

let dates = [];
let answers = [];

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const box = document.getElementById("dates");
  let currentMonth = "";

  data.dates.forEach(d => {

    const display = String(d); // ★Date使わない

    const [m, day] = display.split("/").map(Number);

    if(currentMonth !== m){
      currentMonth = m;
      const h = document.createElement("h3");
      h.textContent = m + "月";
      box.appendChild(h);
    }

    const i = dates.length;

    dates.push(display);
    answers.push("");

    const div = document.createElement("div");

    div.innerHTML = `
      <p>${display}</p>
      <button onclick="setAns(${i},'○',this)">○</button>
      <button onclick="setAns(${i},'△',this)">△</button>
      <button onclick="setAns(${i},'×',this)">×</button>
    `;

    box.appendChild(div);
  });

  document.getElementById("loading").style.display = "none";
});

function setAns(i,val,btn){
  answers[i]=val;

  btn.parentNode.querySelectorAll("button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");
}

function submitData(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!name){
    alert("名前を入力してください");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({name,email,dates,answers})
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.ok){
      alert("送信完了");
    }else{
      alert("エラー："+res.error);
    }
  });
}

</script>

</body>
</html>
